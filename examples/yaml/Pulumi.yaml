name: provider-pve
runtime: yaml
plugins:
  providers:
    - name: pve
      path: ../../bin

resources:
  myVnet:
    type: pve:sdn:Vnet
    properties:
      vnet: testvnet      # max 8 alphanumeric chars, must start with a letter
      zone: ztonvl        # must reference an existing SDN zone
      tag: 10099          # VNI/VLAN tag (1-16777215)
      alias: "my vnet"    # optional
      vlanaware: false    # optional; allow guest VLANs to trunk through
      isolatePorts: false # optional; isolate all bridge interfaces

