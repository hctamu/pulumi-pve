name: provider-pve
runtime: yaml
plugins:
  providers:
    - name: pve
      path: ../../bin

resources:
  # myFile:
  #   type: pve:file:File
  #   properties:
  #     datastoreId: cephfs
  #     contentType: snippets
  #     sourceRaw:
  #       fileData: |
  #         hello world
  #       fileName: testfile011.yaml

  # myPool:
  #   type: pve:pool:Pool
  #   properties:
  #     name: testpool
  #     comment: "a test pool"
  #     storage:
  #       - cephfs
  #     vms:
  #       - 100

  myVM:
    type: pve:vm:VM
    properties:
      name: "aTestVM"
      tags:
        - "tag2"
        - "tag1"
      description: "test VM"
      cpu:
        type: EPYC-v3
        flagsEnabled:
          - virt-ssbd
        flagsDisabled:
          - spec-ctrl
        hidden: true
        hvVendorId: AuthenticAMD
        physBits: "48"
        cores: 4
        sockets: 2
        limit: 3.0
        units: 2048
        vcpus: 3
        numa: true
        numaNodes:
          - cpus: "0-1"
            hostNodes: "0"
            memory: 2048
            policy: "preferred"
          - cpus: "2-3"
            hostNodes: "1"
            policy: "interleave"
      memory: 27875
      efidisk:
        storage: "ceph-ha"
        efitype: "4m"
        preEnrolledKeys: false
      disks:
        # scsi0: flip cache, remove discard, iothread=false, backup=true (remove→nil), replicate=true (remove→nil)
        - storage: "ceph-ha"
          size: 17
          interface: "scsi0"
          cache: "none"
          iothread: false
        # scsi1: change aio, ssd=false, ro=false, add backup=false
        - storage: "ceph-ha"
          size: 17
          interface: "scsi1"
          aio: "native"
          ssd: false
          ro: false
          backup: false
        # sata0: change cache, change aio, ssd=false, remove discard, restore backup (nil)
        - storage: "ceph-ha"
          size: 10
          interface: "sata0"
          cache: "writeback"
          aio: "io_uring"
          ssd: false
        # virtio0: change cache, remove discard, iothread=false, ro=false, add backup=false
        - storage: "ceph-ha"
          size: 10
          interface: "virtio0"
          cache: "writeback"
          iothread: false
          ro: false
          backup: false
      clone:
        vmId: 102
        timeout: 360
        fullClone: true
