name: provider-pve
runtime: yaml
plugins:
  providers:
    - name: pve
      path: ../../bin

variables:
  zone:
    name: vxlanpve
    vxlanPort: 4785
    ipam: pve
    fabric: zerotest
    nodes:
      - stage-devops-proxmox01
      - stage-devops-proxmox02
    

resources:
  myVxlanZone:
    type: pve:vxlanzone:VxlanZone
    properties: ${zone}

