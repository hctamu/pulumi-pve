name: provider-pve
runtime: yaml
plugins:
  providers:
    - name: pve
      path: ../../bin

variables:
  zone:
    name: vxlanpve
    vxlanPort: 4784
    ipam: pve
    fabric: zerotest
    nodes:
      - stage-devops-proxmox02
      - stage-devops-proxmox01
    

resources:
  myVxlanZone:
    type: pve:vxlanzone:VxlanZone
    properties: ${zone}

  mySDNApply:
    type: pve:sdnapply:SDNApply
    properties:
      triggers:
        zone: ${zone}
      allowPending: true
    options:
      dependsOn:
        - ${myVxlanZone}
