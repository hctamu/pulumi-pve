name: provider-pve
runtime: yaml
plugins:
  providers:
    - name: pve
      path: ../../bin

resources:
  # myFile:
  #   type: pve:file:File
  #   properties:
  #     datastoreId: cephfs
  #     contentType: snippets
  #     sourceRaw:
  #       fileData: |
  #         hello world
  #       fileName: testfile011.yaml

  # myPool:
  #   type: pve:pool:Pool
  #   properties:
  #     name: testpool
  #     comment: "a test pool"
  #     storage:
  #       - cephfs
  #     vms:
  #       - 100
  myVM:
    type: pve:vm:VM
    properties:
      name: "aTestVM"
      description: "flags + bandwidth integration test"
      node: "stage-devops-proxmox01"
      vmId: 119
      memory: 2048
      disks:
        # scsi0: changed flags + bandwidth
        - storage: "ceph-ha"
          size: 17
          interface: "scsi0"
          cache: "none"
          iothread: true
          bandwidth:
            mbpsRd: 200.0
            mbpsWr: 100.0
            mbpsRdMax: 400.0
        # scsi1: updated iops
        - storage: "ceph-ha"
          size: 17
          interface: "scsi1"
          bandwidth:
            iopsRd: 2000
            iopsWr: 1000
            iopsRdMax: 4000
        # sata0: remove ssd, restore backup
        - storage: "ceph-ha"
          size: 10
          interface: "sata0"
      clone:
        vmId: 102
        timeout: 360
        fullClone: true
